version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: mern-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"  # Changed from 27017 to avoid conflicts
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=mern_webstore
    networks:
      - mern-network

  # Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mern-server
    restart: unless-stopped
    ports:
      - "5001:5000"  # Changed from 5000 to 5001 to avoid conflicts
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/mern_webstore
      - PORT=5000
    volumes:
      - ./server/public/uploads:/app/public/uploads
    depends_on:
      - mongodb
    networks:
      - mern-network

  # Frontend Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mern-client
    restart: unless-stopped
    ports:
      - "3001:80"  # Changed from 3000 to 3001 to avoid conflicts
    depends_on:
      - server
    networks:
      - mern-network

networks:
  mern-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local

